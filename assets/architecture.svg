<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260">
  <style>
    .box { fill:#ffffff; stroke:#2b6cb0; stroke-width:2; rx:8; ry:8 }
    .label { font-family: Arial, Helvetica, sans-serif; font-size:14px; fill:#1a202c }
    .small { font-size:12px; fill:#4a5568 }
    .arrow { stroke:#2b6cb0; stroke-width:2; fill:none; marker-end:url(#arrowhead) }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b6cb0" />
    </marker>
  </defs>

  <!-- Frontend -->
  <rect x="40" y="40" width="220" height="80" class="box"/>
  <text x="150" y="70" text-anchor="middle" class="label">Frontend</text>
  <text x="150" y="92" text-anchor="middle" class="small">React • TypeScript • Vite</text>

  <!-- Backend -->
  <rect x="290" y="20" width="220" height="120" class="box"/>
  <text x="400" y="55" text-anchor="middle" class="label">Backend API</text>
  <text x="400" y="78" text-anchor="middle" class="small">Python • FastAPI • Auth</text>

  <!-- Database -->
  <rect x="560" y="40" width="180" height="80" class="box"/>
  <text x="650" y="70" text-anchor="middle" class="label">Database</text>
  <text x="650" y="92" text-anchor="middle" class="small">Postgres (SQL schema)</text>

  <!-- Arrows -->
  <path d="M260 80 L290 80" class="arrow"/>
  <path d="M510 80 L560 80" class="arrow"/>

  <!-- Docker Compose / Deployment -->
  <rect x="120" y="150" width="560" height="80" rx="6" ry="6" fill="#f7fafc" stroke="#a0aec0"/>
  <text x="400" y="175" text-anchor="middle" class="label">Containerized (Docker Compose)</text>
  <text x="400" y="196" text-anchor="middle" class="small">Frontend • Backend • Database</text>

  <!-- Labels -->
  <text x="40" y="18" class="small">Architecture Overview</text>
</svg>
