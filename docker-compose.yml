

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: stocks_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mustafa
      POSTGRES_DB: stocksDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/trading-main/00-schema.sql:/docker-entrypoint-initdb.d/00-schema.sql
      - ./backend/trading-main/01-data.sql:/docker-entrypoint-initdb.d/01-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stocks_network

  # Backend FastAPI Application
  backend:
    build:
      context: ./backend/trading-main
      dockerfile: Dockerfile
    container_name: stocks_backend
    environment:
      DATABASE_URL: postgresql://postgres:mustafa@postgres:5432/stocksDB
      SECRET_KEY: your-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stocks_network
    restart: on-failure:3

  # Frontend React Application
  frontend:
    build:
      context: ./frontend/tradeflow-dashboard-main
      dockerfile: Dockerfile
    container_name: stocks_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    networks:
      - stocks_network
    restart: on-failure:3

volumes:
  postgres_data:
    driver: local

networks:
  stocks_network:
    driver: bridge
